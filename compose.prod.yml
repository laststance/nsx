# Production: named data volume, no host TCP publish, Unix socket exposed on the host for PM2.
# Pin Docker volume name to `nsx_mysql_data` (legacy compose used key `mysql_data` → that name).
# A bare key `nsx_mysql_data` would create `nsx_nsx_mysql_data` and mount an empty store.
services:
  db:
    volumes:
      - mysql_data:/var/lib/mysql
      - ./run/mysqld:/var/run/mysqld

volumes:
  mysql_data:
    name: nsx_mysql_data
